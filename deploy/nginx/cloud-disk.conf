server {
    listen 80;
    server_name localhost;

    # Increase this if you plan to upload large files through nginx.
    client_max_body_size 1024m;

    # Frontend build output directory.
    root D:/Go_Project/cloud_disk/web/dist;
    index index.html;

    # Serve the SPA entry for client-side routes such as /disk and /share/:id.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to the Go backend and strip the /api prefix.
    location /api/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
